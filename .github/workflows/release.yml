name: Release

# MVP-9 follow-up — tag-triggered release pipeline.
# Push a tag matching `v*` (e.g. v0.2.0) and this workflow will:
#   1. Build the Windows MSI + NSIS bundles, signed with the updater
#      key when the secret is present.
#   2. Code-sign the NSIS installer when a Windows code-signing cert
#      thumbprint is configured (machine-installed cert).
#   3. Generate latest.json from the NSIS .exe.sig produced in step 1.
#   4. Create a GitHub Release and attach installers + latest.json.
#
# Required repo secrets for a fully-signed release:
#   TAURI_SIGNING_PRIVATE_KEY            updater privkey (from `tauri signer generate`)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   password for the updater privkey
# Optional:
#   WINDOWS_CERT_THUMBPRINT              SHA-1 thumbprint of an
#                                        already-installed Authenticode
#                                        cert; absent → unsigned NSIS

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.2.0)"
        required: true

jobs:
  release:
    name: Build & publish (Windows)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:run

      - name: Tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: pwsh
        run: |
          # Inject Authenticode signing only when a cert thumbprint was
          # provided as a secret. The sign command runs after Tauri
          # produces the NSIS installer; the {{filename}} token is
          # Tauri's interpolation point.
          $thumb = "${{ secrets.WINDOWS_CERT_THUMBPRINT }}"
          if ($thumb) {
            $cmd = "signtool sign /tr http://timestamp.digicert.com /td sha256 /fd sha256 /sha1 $thumb `"%1`""
            $config = @{
              bundle = @{ windows = @{ signCommand = $cmd } }
            } | ConvertTo-Json -Depth 5 -Compress
            npm run tauri -- build --config $config
          } else {
            npm run tauri -- build
          }

      - name: Locate installer artifacts
        id: artifacts
        shell: bash
        run: |
          shopt -s nullglob

          # Everything we ship in the GitHub Release: every MSI locale +
          # NSIS .exe + Tauri 2 updater bundle (.nsis.zip) + signature
          # files. nullglob keeps no-match patterns from leaking through.
          all_arr=(
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.sig
          )

          # Updater client (tauri-plugin-updater v2) fetches the URL from
          # latest.json. With createUpdaterArtifacts:true Tauri ships
          # *.nsis.zip + *.nsis.zip.sig; with "v1Compatible" it stays on
          # *.exe + *.exe.sig. Pick whichever pair exists.
          sig_arr=( src-tauri/target/release/bundle/nsis/*.sig )
          zip_arr=( src-tauri/target/release/bundle/nsis/*.nsis.zip )
          exe_arr=( src-tauri/target/release/bundle/nsis/*.exe )

          sig="${sig_arr[0]:-}"
          updater_installer=""
          if [ -n "$sig" ]; then
            if [ ${#zip_arr[@]} -gt 0 ]; then
              updater_installer="${zip_arr[0]}"
            else
              updater_installer="${exe_arr[0]:-}"
            fi
          fi

          echo "::group::Bundle artifacts"
          printf '  %s\n' "${all_arr[@]}"
          echo "sig:               $sig"
          echo "updater_installer: $updater_installer"
          echo "::endgroup::"

          {
            echo "all<<EOF"
            printf '%s\n' "${all_arr[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "sig=$sig" >> "$GITHUB_OUTPUT"
          echo "updater_installer=$updater_installer" >> "$GITHUB_OUTPUT"

      - name: Generate latest.json
        if: steps.artifacts.outputs.sig != ''
        env:
          TYPERTYPE_VERSION: ${{ steps.ver.outputs.version }}
          TYPERTYPE_NSIS_PATH: ${{ steps.artifacts.outputs.updater_installer }}
          TYPERTYPE_NSIS_SIG_PATH: ${{ steps.artifacts.outputs.sig }}
          TYPERTYPE_DOWNLOAD_BASE: https://github.com/${{ github.repository }}/releases/download/${{ steps.ver.outputs.tag }}
          TYPERTYPE_RELEASE_NOTES: "Typertype ${{ steps.ver.outputs.version }}"
        run: node scripts/release-manifest.mjs latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Typertype ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            ${{ steps.artifacts.outputs.all }}
            latest.json
          fail_on_unmatched_files: false
